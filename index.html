<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>I Am DrugFree Legal and Support</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f6;
      --card: #ffffff;
      --text: #18211d;
      --muted: #5f6f67;
      --accent: #1f7a5c;
      --border: #dce5df;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 44px 20px 56px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 14px 34px rgba(24, 33, 29, 0.07);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      color: var(--accent);
    }
    p {
      margin: 12px 0;
    }
    a {
      color: var(--accent);
      font-weight: 650;
    }
    .links {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }
    .links a {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      background: #fbfdfb;
    }
    .muted {
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>I Am DrugFree</h1>
      <p class="muted">Legal and support pages for I Am DrugFree: Sober Tracker.</p>
      <p>I Am DrugFree is a private recovery tracker for clean days, cravings, journal entries, milestones, reminders, reset notes, and support resource links.</p>
      <div class="links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="support.html">Support</a>
        <a href="terms.html">Terms of Use</a>
      </div>
    </section>
  </main>
</body>
</html>
